# fly.toml — one-click deployment config for Fly.io.
#
# First time setup (CLI):
#   fly launch --no-deploy --copy-config            # generates app + name
#   fly volume create liveops_data --region iad --size 1
#   fly secrets set GEMINI_API_KEY=... SLACK_WEBHOOK=... ANALYST_CONN_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   fly deploy
#
# Subsequent deploys:
#   fly deploy

app = "liveops-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  STREAMLIT_SERVER_PORT = "8501"
  STREAMLIT_SERVER_ADDRESS = "0.0.0.0"
  STREAMLIT_SERVER_HEADLESS = "true"
  STREAMLIT_BROWSER_GATHER_USAGE_STATS = "false"

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/_stcore/health"

[[mounts]]
  source = "liveops_data"
  destination = "/app/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
